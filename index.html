<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennscorer Dashboard - Ostermann Cup 2026</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { 
            background: #ffffff; 
            color: #000; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }
        .dashboard { 
            display: flex;
            flex-direction: column;
            gap: 15px; 
            max-width: 600px; 
            margin: auto; 
        }
        .card { 
            background: #4d88ff; /* Hellblaues Inlay */
            border-radius: 4px; 
            overflow: hidden; 
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            border: 1px solid #3b77eb;
        }
        .match-header { 
            background: #000099; /* Dunkelblaues Kopfband */
            padding: 6px 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 13px; 
            font-weight: normal; 
            color: #fff; 
        }
        .duration { 
            font-family: monospace; 
            color: #fff; 
            font-size: 12px; 
        }
        .score-table {
            width: 100%;
            border-collapse: collapse;
        }
        .player-row {
            border-bottom: 1px solid #6699ff;
        }
        .player-row td {
            padding: 6px 8px;
            vertical-align: middle;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }
        .name-cell {
            width: 55%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* Gelbe Schrift für den Aufschläger (ersetzt den Punkt) */
        .is-serving {
            color: #ffff00 !important;
        }
        .pts-cell {
            background: #2050b0;
            width: 12%;
            text-align: center;
            border-left: 1px solid #4d88ff;
            font-size: 14px;
        }
        .s-cell { 
            background: #2560c0; 
            width: 11%; 
            text-align: center; 
            border-left: 1px solid #4d88ff;
            font-size: 14px;
        }
        .ticker { 
            background: #4d88ff; 
            padding: 6px 10px; 
            font-size: 12px; 
            color: #fff; 
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <div class="match-header"><span id="t1_name">Match 1</span><span class="duration" id="t1_time">00:00:00</span></div>
        <table class="score-table">
            <tr class="player-row">
                <td class="name-cell" id="t1_p1_container"><span id="t1_p1">-</span></td>
                <td class="pts-cell" id="t1_pts_a">00</td>
                <td class="s-cell" id="t1_s1_a">0</td>
                <td class="s-cell" id="t1_s2_a">0</td>
                <td class="s-cell" id="t1_s3_a">0</td>
            </tr>
            <tr class="player-row">
                <td class="name-cell" id="t1_p2_container"><span id="t1_p2">-</span></td>
                <td class="pts-cell" id="t1_pts_b">00</td>
                <td class="s-cell" id="t1_s1_b">0</td>
                <td class="s-cell" id="t1_s2_b">0</td>
                <td class="s-cell" id="t1_s3_b">0</td>
            </tr>
        </table>
        <div class="ticker" id="t1_log">Bereit...</div>
    </div>

    <div class="card">
        <div class="match-header"><span id="t2_name">Match 2</span><span class="duration" id="t2_time">00:00:00</span></div>
        <table class="score-table">
            <tr class="player-row">
                <td class="name-cell" id="t2_p1_container"><span id="t2_p1">-</span></td>
                <td class="pts-cell" id="t2_pts_a">00</td>
                <td class="s-cell" id="t2_s1_a">0</td>
                <td class="s-cell" id="t2_s2_a">0</td>
                <td class="s-cell" id="t2_s3_a">0</td>
            </tr>
            <tr class="player-row">
                <td class="name-cell" id="t2_p2_container"><span id="t2_p2">-</span></td>
                <td class="pts-cell" id="t2_pts_b">00</td>
                <td class="s-cell" id="t2_s1_b">0</td>
                <td class="s-cell" id="t2_s2_b">0</td>
                <td class="s-cell" id="t2_s3_b">0</td>
            </tr>
        </table>
        <div class="ticker" id="t2_log">Bereit...</div>
    </div>

    <div class="card">
        <div class="match-header"><span id="t3_name">Match 3</span><span class="duration" id="t3_time">00:00:00</span></div>
        <table class="score-table">
            <tr class="player-row">
                <td class="name-cell" id="t3_p1_container"><span id="t3_p1">-</span></td>
                <td class="pts-cell" id="t3_pts_a">00</td>
                <td class="s-cell" id="t3_s1_a">0</td>
                <td class="s-cell" id="t3_s2_a">0</td>
                <td class="s-cell" id="t3_s3_a">0</td>
            </tr>
            <tr class="player-row">
                <td class="name-cell" id="t3_p2_container"><span id="t3_p2">-</span></td>
                <td class="pts-cell" id="t3_pts_b">00</td>
                <td class="s-cell" id="t3_s1_b">0</td>
                <td class="s-cell" id="t3_s2_b">0</td>
                <td class="s-cell" id="t3_s3_b">0</td>
            </tr>
        </table>
        <div class="ticker" id="t3_log">Bereit...</div>
    </div>

    <div class="card">
        <div class="match-header"><span id="t4_name">Match 4</span><span class="duration" id="t4_time">00:00:00</span></div>
        <table class="score-table">
            <tr class="player-row">
                <td class="name-cell" id="t4_p1_container"><span id="t4_p1">-</span></td>
                <td class="pts-cell" id="t4_pts_a">00</td>
                <td class="s-cell" id="t4_s1_a">0</td>
                <td class="s-cell" id="t4_s2_a">0</td>
                <td class="s-cell" id="t4_s3_a">0</td>
            </tr>
            <tr class="player-row">
                <td class="name-cell" id="t4_p2_container"><span id="t4_p2">-</span></td>
                <td class="pts-cell" id="t4_pts_b">00</td>
                <td class="s-cell" id="t4_s1_b">0</td>
                <td class="s-cell" id="t4_s2_b">0</td>
                <td class="s-cell" id="t4_s3_b">0</td>
            </tr>
        </table>
        <div class="ticker" id="t4_log">Bereit...</div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAFZSlFEKPt-T8gZoLW4uHc-k4eyHSTMGo",
        authDomain: "tennscorer.firebaseapp.com",
        projectId: "tennscorer"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    function updateMatch(d, prefix) {
        if(!d) return;

        // Header & Spielernamen
        document.getElementById(prefix+'name').innerText = (d.tournamentName || "Match") + (d.round ? " - " + d.round : "");
        document.getElementById(prefix+'p1').innerText = d.player_a || "P1";
        document.getElementById(prefix+'p2').innerText = d.player_b || "P2";

        // Punkte (Immer an fester Position neben den Sätzen)
        document.getElementById(prefix+'pts_a').innerText = d.points_a !== undefined ? d.points_a : "00";
        document.getElementById(prefix+'pts_b').innerText = d.points_b !== undefined ? d.points_b : "00";
        
        // Sätze befüllen
        document.getElementById(prefix+'s1_a').innerText = d.set1_a !== undefined ? d.set1_a : "0";
        document.getElementById(prefix+'s1_b').innerText = d.set1_b !== undefined ? d.set1_b : "0";
        
        document.getElementById(prefix+'s2_a').innerText = d.set2_a !== undefined ? d.set2_a : "0";
        document.getElementById(prefix+'s2_b').innerText = d.set2_b !== undefined ? d.set2_b : "0";
        
        document.getElementById(prefix+'s3_a').innerText = d.set3_a !== undefined ? d.set3_a : "0";
        document.getElementById(prefix+'s3_b').innerText = d.set3_b !== undefined ? d.set3_b : "0";

        // Match Comments / Log anzeigen (Ersetzt das "(in progress)" durch den echten Text)
        document.getElementById(prefix+'log').innerText = d.event_log || "(in progress)";

        // Aufschläger markieren (Text wird gelb wie bei Tennisticker)
        if (d.server === 'a') {
            document.getElementById(prefix+'p1_container').classList.add('is-serving');
            document.getElementById(prefix+'p2_container').classList.remove('is-serving');
        } else if (d.server === 'b') {
            document.getElementById(prefix+'p2_container').classList.add('is-serving');
            document.getElementById(prefix+'p1_container').classList.remove('is-serving');
        } else {
            document.getElementById(prefix+'p1_container').classList.remove('is-serving');
            document.getElementById(prefix+'p2_container').classList.remove('is-serving');
        }

        if(d.start_time) startTimer(prefix+'time', d.start_time.toDate());
    }

    let timers = {};
    function startTimer(id, start) {
        if(timers[id]) return;
        timers[id] = setInterval(() => {
            const diff = Math.floor((new Date() - start) / 1000);
            if (diff < 0) return;
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById(id).innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    // Firebase Snapshots
    db.collection("match_cloud").doc("match_1").onSnapshot(doc => updateMatch(doc.data(), 't1_'));
    db.collection("match_cloud").doc("match_2").onSnapshot(doc => updateMatch(doc.data(), 't2_'));
    db.collection("match_cloud").doc("match_3").onSnapshot(doc => updateMatch(doc.data(), 't3_'));
    db.collection("match_cloud").doc("match_4").onSnapshot(doc => updateMatch(doc.data(), 't4_'));
</script>

</body>
</html>
