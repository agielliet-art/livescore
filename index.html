<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennscorer Dashboard - Pro 4er</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 15px; max-width: 1200px; margin: auto; }
        .card { background: #151515; border-radius: 12px; border: 1px solid #252525; overflow: hidden; display: flex; flex-direction: column; }
        .match-header { background: #222; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: bold; color: #aaa; text-transform: uppercase; }
        .duration { font-family: monospace; color: #ffcc00; font-size: 14px; }
        
        .score-area { padding: 15px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .name-box { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: bold; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
        .serv-dot { width: 8px; height: 8px; background: #ffcc00; border-radius: 50%; box-shadow: 0 0 8px #ffcc00; display: none; }
        .is-serving { display: block; }

        .sets { display: flex; gap: 5px; }
        .s-box { background: #252525; padding: 6px 12px; border-radius: 4px; min-width: 20px; text-align: center; color: #fff; font-weight: bold; font-size: 18px; border: 1px solid #333; }
        .s-empty { color: #444; border: 1px solid #222; }

        .game-display { background: #0b4d21; margin: 12px 0; padding: 8px; border-radius: 8px; text-align: center; border: 1px solid #1a8a3d; }
        .pts-label { font-size: 9px; color: #8fdfa4; letter-spacing: 1px; margin-bottom: 2px; }
        .pts { font-size: 35px; font-weight: 900; line-height: 1; }

        .ticker { background: #111; padding: 10px; border-top: 1px solid #222; font-size: 12px; color: #bbb; min-height: 35px; font-style: italic; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card">
        <div class="match-header"><span id="t1_name">Match 1</span><span class="duration" id="t1_time">00:00:00</span></div>
        <div class="score-area">
            <div class="player-row">
                <div class="name-box"><div id="t1_dot_a" class="serv-dot"></div><span id="t1_p1">-</span></div>
                <div class="sets">
                    <div id="t1_s1_a" class="s-box">0</div>
                    <div id="t1_s2_a" class="s-box s-empty">0</div>
                    <div id="t1_s3_a" class="s-box s-empty">0</div>
                </div>
            </div>
            <div class="game-display">
                <div class="pts-label">POINTS</div>
                <div class="pts"><span id="t1_pts_a">0</span> : <span id="t1_pts_b">0</span></div>
            </div>
            <div class="player-row">
                <div class="name-box"><div id="t1_dot_b" class="serv-dot"></div><span id="t1_p2">-</span></div>
                <div class="sets">
                    <div id="t1_s1_b" class="s-box">0</div>
                    <div id="t1_s2_b" class="s-box s-empty">0</div>
                    <div id="t1_s3_b" class="s-box s-empty">0</div>
                </div>
            </div>
        </div>
        <div class="ticker" id="t1_log">Lade Daten...</div>
    </div>

    <div class="card">
        <div class="match-header"><span id="t2_name">Match 2</span><span class="duration" id="t2_time">00:00:00</span></div>
        <div class="score-area">
            <div class="player-row">
                <div class="name-box"><div id="t2_dot_a" class="serv-dot"></div><span id="t2_p1">-</span></div>
                <div class="sets">
                    <div id="t2_s1_a" class="s-box">0</div>
                    <div id="t2_s2_a" class="s-box s-empty">0</div>
                    <div id="t2_s3_a" class="s-box s-empty">0</div>
                </div>
            </div>
            <div class="game-display">
                <div class="pts-label">POINTS</div>
                <div class="pts"><span id="t2_pts_a">0</span> : <span id="t2_pts_b">0</span></div>
            </div>
            <div class="player-row">
                <div class="name-box"><div id="t2_dot_b" class="serv-dot"></div><span id="t2_p2">-</span></div>
                <div class="sets">
                    <div id="t2_s1_b" class="s-box">0</div>
                    <div id="t2_s2_b" class="s-box s-empty">0</div>
                    <div id="t2_s3_b" class="s-box s-empty">0</div>
                </div>
            </div>
        </div>
        <div class="ticker" id="t2_log">Lade Daten...</div>
    </div>

    <div class="card">
        <div class="match-header"><span id="t3_name">Match 3</span><span class="duration" id="t3_time">00:00:00</span></div>
        <div class="score-area">
            <div class="player-row">
                <div class="name-box"><div id="t3_dot_a" class="serv-dot"></div><span id="t3_p1">-</span></div>
                <div class="sets">
                    <div id="t3_s1_a" class="s-box">0</div>
                    <div id="t3_s2_a" class="s-box s-empty">0</div>
                    <div id="t3_s3_a" class="s-box s-empty">0</div>
                </div>
            </div>
            <div class="game-display">
                <div class="pts-label">POINTS</div>
                <div class="pts"><span id="t3_pts_a">0</span> : <span id="t3_pts_b">0</span></div>
            </div>
            <div class="player-row">
                <div class="name-box"><div id="t3_dot_b" class="serv-dot"></div><span id="t3_p2">-</span></div>
                <div class="sets">
                    <div id="t3_s1_b" class="s-box">0</div>
                    <div id="t3_s2_b" class="s-box s-empty">0</div>
                    <div id="t3_s3_b" class="s-box s-empty">0</div>
                </div>
            </div>
        </div>
        <div class="ticker" id="t3_log">Lade Daten...</div>
    </div>

    <div class="card">
        <div class="match-header"><span id="t4_name">Match 4</span><span class="duration" id="t4_time">00:00:00</span></div>
        <div class="score-area">
            <div class="player-row">
                <div class="name-box"><div id="t4_dot_a" class="serv-dot"></div><span id="t4_p1">-</span></div>
                <div class="sets">
                    <div id="t4_s1_a" class="s-box">0</div>
                    <div id="t4_s2_a" class="s-box s-empty">0</div>
                    <div id="t4_s3_a" class="s-box s-empty">0</div>
                </div>
            </div>
            <div class="game-display">
                <div class="pts-label">POINTS</div>
                <div class="pts"><span id="t4_pts_a">0</span> : <span id="t4_pts_b">0</span></div>
            </div>
            <div class="player-row">
                <div class="name-box"><div id="t4_dot_b" class="serv-dot"></div><span id="t4_p2">-</span></div>
                <div class="sets">
                    <div id="t4_s1_b" class="s-box">0</div>
                    <div id="t4_s2_b" class="s-box s-empty">0</div>
                    <div id="t4_s3_b" class="s-box s-empty">0</div>
                </div>
            </div>
        </div>
        <div class="ticker" id="t4_log">Lade Daten...</div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAFZSlFEKPt-T8gZoLW4uHc-k4eyHSTMGo",
        authDomain: "tennscorer.firebaseapp.com",
        projectId: "tennscorer"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    function updateMatch(d, prefix) {
        if(!d) return;
        document.getElementById(prefix+'name').innerText = d.tournamentName || "Match";
        document.getElementById(prefix+'p1').innerText = d.player_a || "P1";
        document.getElementById(prefix+'p2').innerText = d.player_b || "P2";
        
        document.getElementById(prefix+'pts_a').innerText = d.points_a || "0";
        document.getElementById(prefix+'pts_b').innerText = d.points_b || "0";
        
        document.getElementById(prefix+'s1_a').innerText = d.set1_a || "0";
        document.getElementById(prefix+'s1_b').innerText = d.set1_b || "0";
        
        if(d.set2_a !== undefined) {
            document.getElementById(prefix+'s2_a').innerText = d.set2_a;
            document.getElementById(prefix+'s2_b').innerText = d.set2_b;
            document.getElementById(prefix+'s2_a').classList.remove('s-empty');
            document.getElementById(prefix+'s2_b').classList.remove('s-empty');
        }
        if(d.set3_a !== undefined) {
            document.getElementById(prefix+'s3_a').innerText = d.set3_a;
            document.getElementById(prefix+'s3_b').innerText = d.set3_b;
            document.getElementById(prefix+'s3_a').classList.remove('s-empty');
            document.getElementById(prefix+'s3_b').classList.remove('s-empty');
        }

        document.getElementById(prefix+'log').innerText = d.event_log || "...";
        document.getElementById(prefix+'dot_a').style.display = (d.server === 'a') ? 'block' : 'none';
        document.getElementById(prefix+'dot_b').style.display = (d.server === 'b') ? 'block' : 'none';

        if(d.start_time) startTimer(prefix+'time', d.start_time.toDate());
    }

    let timers = {};
    function startTimer(id, start) {
        if(timers[id]) return;
        timers[id] = setInterval(() => {
            const diff = Math.floor((new Date() - start) / 1000);
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById(id).innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    // --- HIER DIE IDs DEINER FIREBASE DOKUMENTE EINTRAGEN ---
    db.collection("match_cloud").doc("Ostermann_finale_damen").onSnapshot(doc => updateMatch(doc.data(), 't1_'));
    db.collection("match_cloud").doc("Ostermann_finale_herren").onSnapshot(doc => updateMatch(doc.data(), 't2_'));
    db.collection("match_cloud").doc("DEINE_ID_3").onSnapshot(doc => updateMatch(doc.data(), 't3_'));
    db.collection("match_cloud").doc("DEINE_ID_4").onSnapshot(doc => updateMatch(doc.data(), 't4_'));
</script>
</body>
</html>
