<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennscorer Dashboard - Ostermann Cup</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        
        .card { background: #151515; border-radius: 12px; border: 1px solid #252525; overflow: hidden; display: flex; flex-direction: column; }
        .match-header { background: #222; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: bold; color: #aaa; text-transform: uppercase; }
        .live-tag { color: #ff3333; display: flex; align-items: center; gap: 5px; }
        .live-tag::before { content: ''; width: 8px; height: 8px; background: #ff3333; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .score-area { padding: 20px; }
        .player-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .name-box { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: bold; text-transform: uppercase; }
        .serv-dot { width: 8px; height: 8px; background: #ffcc00; border-radius: 50%; box-shadow: 0 0 8px #ffcc00; visibility: hidden; }
        .is-serving { visibility: visible; }

        .sets { display: flex; gap: 5px; }
        .s-box { background: #252525; padding: 5px 10px; border-radius: 4px; min-width: 20px; text-align: center; color: #888; font-weight: bold; }
        .s-box.active { color: #fff; background: #333; border: 1px solid #444; }

        .game-display { background: #0b4d21; margin: 15px 0; padding: 10px; border-radius: 8px; text-align: center; }
        .pts { font-size: 40px; font-weight: 900; line-height: 1; }

        .ticker { background: #111; padding: 12px; border-top: 1px solid #222; font-size: 13px; color: #ddd; min-height: 40px; display: flex; align-items: center; }
        .duration { font-family: monospace; color: #ffcc00; font-size: 14px; }

        @media (max-width: 500px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="card" id="match-damen">
        <div class="match-header">
            <span id="t1_name">Damen Finale</span>
            <span class="duration" id="t1_time">00:00:00</span>
            <span class="live-tag">LIVE</span>
        </div>
        <div class="score-area">
            <div class="player-row">
                <div class="name-box"><div id="t1_dot_a" class="serv-dot"></div><span id="t1_p1">-</span></div>
                <div class="sets"><div id="t1_s1_1" class="s-box">-</div><div id="t1_s1_2" class="s-box">-</div></div>
            </div>
            <div class="game-display"><div class="pts"><span id="t1_pts_a">0</span> : <span id="t1_pts_b">0</span></div></div>
            <div class="player-row">
                <div class="name-box"><div id="t1_dot_b" class="serv-dot"></div><span id="t1_p2">-</span></div>
                <div class="sets"><div id="t1_s2_1" class="s-box">-</div><div id="t1_s2_2" class="s-box">-</div></div>
            </div>
        </div>
        <div class="ticker" id="t1_log">Warten auf Spielstart...</div>
    </div>

    <div class="card" id="match-herren">
        <div class="match-header">
            <span id="t2_name">Herren Finale</span>
            <span class="duration" id="t2_time">00:00:00</span>
            <span class="live-tag">LIVE</span>
        </div>
        <div class="score-area">
            <div class="player-row">
                <div class="name-box"><div id="t2_dot_a" class="serv-dot"></div><span id="t2_p1">-</span></div>
                <div class="sets"><div id="t2_s1_1" class="s-box">-</div><div id="t2_s1_2" class="s-box">-</div></div>
            </div>
            <div class="game-display"><div class="pts"><span id="t2_pts_a">0</span> : <span id="t2_pts_b">0</span></div></div>
            <div class="player-row">
                <div class="name-box"><div id="t2_dot_b" class="serv-dot"></div><span id="t2_p2">-</span></div>
                <div class="sets"><div id="t2_s2_1" class="s-box">-</div><div id="t2_s2_2" class="s-box">-</div></div>
            </div>
        </div>
        <div class="ticker" id="t2_log">Warten auf Spielstart...</div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAFZSlFEKPt-T8gZoLW4uHc-k4eyHSTMGo",
        authDomain: "tennscorer.firebaseapp.com",
        projectId: "tennscorer"
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();

    function updateMatch(id, d, prefix) {
        if(!d) return;
        document.getElementById(prefix+'name').innerText = d.tournamentName || "Finale";
        document.getElementById(prefix+'p1').innerText = d.player_a || "P1";
        document.getElementById(prefix+'p2').innerText = d.player_b || "P2";
        document.getElementById(prefix+'pts_a').innerText = d.points_a || "0";
        document.getElementById(prefix+'pts_b').innerText = d.points_b || "0";
        document.getElementById(prefix+'s1_1').innerText = d.set1_a ?? "-";
        document.getElementById(prefix+'s2_1').innerText = d.set1_b ?? "-";
        document.getElementById(prefix+'s1_2').innerText = d.set2_a ?? "-";
        document.getElementById(prefix+'s2_2').innerText = d.set2_b ?? "-";
        document.getElementById(prefix+'log').innerText = d.event_log || "...";
        
        document.getElementById(prefix+'dot_a').className = (d.server === 'a') ? 'serv-dot is-serving' : 'serv-dot';
        document.getElementById(prefix+'dot_b').className = (d.server === 'b') ? 'serv-dot is-serving' : 'serv-dot';

        if(d.start_time) {
            startTimer(prefix+'time', d.start_time.toDate());
        }
    }

    let timers = {};
    function startTimer(elementId, startTime) {
        if(timers[elementId]) clearInterval(timers[elementId]);
        timers[elementId] = setInterval(() => {
            const diff = Math.floor((new Date() - startTime) / 1000);
            const h = Math.floor(diff / 3600).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById(elementId).innerText = `${h}:${m}:${s}`;
        }, 1000);
    }

    // Live-Sync für beide Matches
    db.collection("match_cloud").doc("Ostermann_finale_damen").onSnapshot(doc => updateMatch(doc.id, doc.data(), 't1_'));
    db.collection("match_cloud").doc("Ostermann_finale_herren").onSnapshot(doc => updateMatch(doc.id, doc.data(), 't2_'));
</script>
</body>
</html>
