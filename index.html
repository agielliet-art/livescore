<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tennscorer PRO - Live</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { width: 100%; max-width: 550px; }
        
        /* Status-Leiste oben */
        .status-bar { background: #cc0000; color: white; text-align: center; font-size: 12px; font-weight: bold; padding: 5px; border-radius: 5px 5px 0 0; display: none; text-transform: uppercase; }
        
        .card { background: #151515; padding: 20px; border-radius: 0 0 15px 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 1px solid #252525; }
        .trn-name { color: #aaa; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 15px; }
        
        .player-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .name-area { display: flex; align-items: center; gap: 10px; }
        .name { font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .serv-dot { width: 10px; height: 10px; background: #ffcc00; border-radius: 50%; box-shadow: 0 0 10px #ffcc00; display: none; }
        
        .sets-area { display: flex; gap: 8px; }
        .s-box { background: #252525; padding: 8px 12px; border-radius: 5px; font-weight: bold; min-width: 25px; text-align: center; font-size: 18px; color: #888; }
        .s-box.active { color: #fff; background: #333; }

        .game-panel { background: linear-gradient(145deg, #0b4d21, #083a19); margin: 25px 0; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #1a8a3d; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
        .pts-label { font-size: 10px; color: #8fdfa4; letter-spacing: 2px; margin-bottom: 5px; }
        .points { font-size: 55px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
        
        /* Ticker / Events */
        .ticker-box { background: #111; margin-top: 20px; border-radius: 10px; padding: 15px; border: 1px solid #222; }
        .ticker-head { font-size: 10px; color: #555; text-transform: uppercase; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .ticker-text { font-size: 15px; color: #ddd; font-style: italic; line-height: 1.5; }
        .violation-alert { color: #ff3333; background: rgba(255,51,51,0.1); border: 1px solid #ff3333; padding: 8px; border-radius: 5px; margin-top: 10px; font-size: 13px; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="match-status-bar" class="status-bar">LIVE</div>
        <div class="card">
            <div id="trn" class="trn-name">Lade Turnier-Daten...</div>
            
            <div class="player-row">
                <div class="name-area">
                    <div id="dot_a" class="serv-dot"></div>
                    <span id="n1" class="name">-</span>
                </div>
                <div class="sets-area">
                    <div id="s1_1" class="s-box">-</div>
                    <div id="s1_2" class="s-box">-</div>
                </div>
            </div>

            <div class="game-panel">
                <div class="pts-label">CURRENT GAME</div>
                <div class="points"><span id="p1_p">0</span> : <span id="p2_p">0</span></div>
            </div>

            <div class="player-row">
                <div class="name-area">
                    <div id="dot_b" class="serv-dot"></div>
                    <span id="n2" class="name">-</span>
                </div>
                <div class="sets-area">
                    <div id="s2_1" class="s-box">-</div>
                    <div id="s2_2" class="s-box">-</div>
                </div>
            </div>

            <div class="ticker-box">
                <div class="ticker-head"><span>Live Match Log</span><span id="match-time">●</span></div>
                <div id="log" class="ticker-text">Warten auf Schiedsrichter...</div>
                <div id="viol" class="violation-alert"></div>
            </div>
        </div>
    </div>

    <script>
        var config = {
            apiKey: "AIzaSyAFZSlFEKPt-T8gZoLW4uHc-k4eyHSTMGo",
            authDomain: "tennscorer.firebaseapp.com",
            projectId: "tennscorer"
        };
        firebase.initializeApp(config);
        var db = firebase.firestore();

        db.collection("match_cloud").doc("Ostermann_finale_damen").onSnapshot((doc) => {
            var d = doc.data();
            if(d) {
                // Basis-Daten
                document.getElementById('trn').innerText = d.tournamentName || "TENNSCORER OPEN";
                document.getElementById('n1').innerText = d.player_a || "Spieler A";
                document.getElementById('n2').innerText = d.player_b || "Spieler B";
                
                // Score
                document.getElementById('p1_p').innerText = d.points_a || "0";
                document.getElementById('p2_p').innerText = d.points_b || "0";
                document.getElementById('s1_1').innerText = d.set1_a ?? "-";
                document.getElementById('s2_1').innerText = d.set1_b ?? "-";
                document.getElementById('s1_2').innerText = d.set2_a ?? "-";
                document.getElementById('s2_2').innerText = d.set2_b ?? "-";

                // Server Dot
                document.getElementById('dot_a').style.display = (d.server === 'a') ? 'block' : 'none';
                document.getElementById('dot_b').style.display = (d.server === 'b') ? 'block' : 'none';

                // Live Log & Status
                document.getElementById('log').innerText = d.event_log || "Match beginnt in Kürze...";
                
                if(d.match_status) {
                    document.getElementById('match-status-bar').innerText = d.match_status;
                    document.getElementById('match-status-bar').style.display = 'block';
                }

                // Violations
                if(d.violation_info && d.violation_info !== "None") {
                    document.getElementById('viol').innerText = "⚠️ " + d.violation_info;
                    document.getElementById('viol').style.display = 'block';
                } else {
                    document.getElementById('viol').style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
